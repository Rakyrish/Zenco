services:
  # ─── Django Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_DEBUG=False
      - DB_NAME=zencodb
      - DB_USER=zenco
      - DB_PASSWORD=zencosecret
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SCHEMA=public
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
        NEXT_PUBLIC_SITE_URL: http://localhost
        NEXT_PUBLIC_COMPANY_NAME: ${COMPANY_NAME:-}
        NEXT_PUBLIC_COMPANY_DIVISION: ${COMPANY_DIVISION:-}
        NEXT_PUBLIC_COMPANY_FULL_NAME: ${COMPANY_FULL_NAME:-}
        NEXT_PUBLIC_COMPANY_TAGLINE: ${COMPANY_TAGLINE:-}
        NEXT_PUBLIC_COMPANY_DESCRIPTION: ${COMPANY_DESCRIPTION:-}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${COMPANY_WHATSAPP_NUMBER:-}
        NEXT_PUBLIC_PHONE_NUMBER: ${COMPANY_PHONE_NUMBER:-}
        NEXT_PUBLIC_COMPANY_EMAIL: ${COMPANY_EMAIL:-}
        NEXT_PUBLIC_COMPANY_STREET_ADDRESS: ${COMPANY_STREET_ADDRESS:-}
        NEXT_PUBLIC_COMPANY_CITY: ${COMPANY_CITY:-}
        NEXT_PUBLIC_COMPANY_COUNTRY: ${COMPANY_COUNTRY:-}
        NEXT_PUBLIC_COMPANY_POSTAL_CODE: ${COMPANY_POSTAL_CODE:-}
        NEXT_PUBLIC_COMPANY_OPENING_HOURS: ${COMPANY_OPENING_HOURS:-}
        NEXT_PUBLIC_SERVICE_AREA: ${SERVICE_AREA:-}
        NEXT_PUBLIC_LOCALE: ${SITE_LOCALE:-}
        NEXT_PUBLIC_TIME_ZONE: ${SITE_TIME_ZONE:-}
        NEXT_PUBLIC_CURRENCY: ${SITE_CURRENCY:-}
        NEXT_PUBLIC_ACCEPTED_CURRENCIES: ${ACCEPTED_CURRENCIES:-}
        NEXT_PUBLIC_COMPANY_LATITUDE: ${COMPANY_LATITUDE:-}
        NEXT_PUBLIC_COMPANY_LONGITUDE: ${COMPANY_LONGITUDE:-}
        NEXT_PUBLIC_GOOGLE_MAPS_PLACE_QUERY: ${GOOGLE_MAPS_PLACE_QUERY:-}
        NEXT_PUBLIC_GOOGLE_MAPS_EMBED_KEY: ${GOOGLE_MAPS_EMBED_KEY:-}
        NEXT_PUBLIC_LINKEDIN_URL: ${LINKEDIN_URL:-}
        NEXT_PUBLIC_INSTAGRAM_URL: ${INSTAGRAM_URL:-}
        NEXT_PUBLIC_FACEBOOK_URL: ${FACEBOOK_URL:-}
        NEXT_PUBLIC_TIKTOK_URL: ${TIKTOK_URL:-}
        NEXT_PUBLIC_TWITTER_URL: ${TWITTER_URL:-}
        NEXT_PUBLIC_TWITTER_HANDLE: ${TWITTER_HANDLE:-}
        NEXT_PUBLIC_DEFAULT_KEYWORDS: ${DEFAULT_KEYWORDS:-}
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_SITE_URL=http://localhost
      - NEXT_PUBLIC_COMPANY_NAME=${COMPANY_NAME:-}
      - NEXT_PUBLIC_COMPANY_DIVISION=${COMPANY_DIVISION:-}
      - NEXT_PUBLIC_COMPANY_FULL_NAME=${COMPANY_FULL_NAME:-}
      - NEXT_PUBLIC_COMPANY_TAGLINE=${COMPANY_TAGLINE:-}
      - NEXT_PUBLIC_COMPANY_DESCRIPTION=${COMPANY_DESCRIPTION:-}
      - NEXT_PUBLIC_WHATSAPP_NUMBER=${COMPANY_WHATSAPP_NUMBER:-}
      - NEXT_PUBLIC_PHONE_NUMBER=${COMPANY_PHONE_NUMBER:-}
      - NEXT_PUBLIC_COMPANY_EMAIL=${COMPANY_EMAIL:-}
      - NEXT_PUBLIC_COMPANY_STREET_ADDRESS=${COMPANY_STREET_ADDRESS:-}
      - NEXT_PUBLIC_COMPANY_CITY=${COMPANY_CITY:-}
      - NEXT_PUBLIC_COMPANY_COUNTRY=${COMPANY_COUNTRY:-}
      - NEXT_PUBLIC_COMPANY_POSTAL_CODE=${COMPANY_POSTAL_CODE:-}
      - NEXT_PUBLIC_COMPANY_OPENING_HOURS=${COMPANY_OPENING_HOURS:-}
      - NEXT_PUBLIC_SERVICE_AREA=${SERVICE_AREA:-}
      - NEXT_PUBLIC_LOCALE=${SITE_LOCALE:-}
      - NEXT_PUBLIC_TIME_ZONE=${SITE_TIME_ZONE:-}
      - NEXT_PUBLIC_CURRENCY=${SITE_CURRENCY:-}
      - NEXT_PUBLIC_ACCEPTED_CURRENCIES=${ACCEPTED_CURRENCIES:-}
      - NEXT_PUBLIC_COMPANY_LATITUDE=${COMPANY_LATITUDE:-}
      - NEXT_PUBLIC_COMPANY_LONGITUDE=${COMPANY_LONGITUDE:-}
      - NEXT_PUBLIC_GOOGLE_MAPS_PLACE_QUERY=${GOOGLE_MAPS_PLACE_QUERY:-}
      - NEXT_PUBLIC_GOOGLE_MAPS_EMBED_KEY=${GOOGLE_MAPS_EMBED_KEY:-}
      - NEXT_PUBLIC_LINKEDIN_URL=${LINKEDIN_URL:-}
      - NEXT_PUBLIC_INSTAGRAM_URL=${INSTAGRAM_URL:-}
      - NEXT_PUBLIC_FACEBOOK_URL=${FACEBOOK_URL:-}
      - NEXT_PUBLIC_TIKTOK_URL=${TIKTOK_URL:-}
      - NEXT_PUBLIC_TWITTER_URL=${TWITTER_URL:-}
      - NEXT_PUBLIC_TWITTER_HANDLE=${TWITTER_HANDLE:-}
      - NEXT_PUBLIC_DEFAULT_KEYWORDS=${DEFAULT_KEYWORDS:-}
    env_file:
      - .env
    expose:
      - "3000"

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=zencodb
      - POSTGRES_USER=zenco
      - POSTGRES_PASSWORD=zencosecret
    ports:
      - "5432:5432"

  # ─── Redis Cache & Celery Broker ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_DEBUG=False
      - DB_NAME=zencodb
      - DB_USER=zenco
      - DB_PASSWORD=zencosecret
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SCHEMA=public
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume:
  media_volume:
